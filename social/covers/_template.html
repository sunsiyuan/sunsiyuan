<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<link rel="stylesheet" href="cover.css">
</head>
<body>
  <!-- ========== 编辑区：改文字就行，别的不用动 ========== -->
  <div class="card">

    <!-- eyebrow 小标签 -->
    <div class="eyebrow"><span class="bar"></span><span class="label">复盘 · 随笔</span></div>

    <!-- 巨字标题：<span class="accent"> 高亮 1–2 个关键字；<br> 换行；一般 2 行最好看 -->
    <div class="title">主标题<span class="accent">高亮</span><br>第二行</div>

    <div class="rule"></div>

    <!-- 副标题：一句人话，<br> 换行 -->
    <div class="subtitle">副标题第一行，<br>副标题第二行</div>

    <!-- 落款 -->
    <div class="footer">孙思远 · sunsiyuan.xyz</div>

  </div>
  <!-- ========== 编辑区结束 ========== -->
</body></html>
